# uipilot pack config — edit to describe YOUR app(s).
# Reference: the uipilot skill (.claude/skills/uipilot/SKILL.md).
pack: PACK_NAME
apps: [app]                    # one id per app; each needs data/<id>.app.yaml

tokens:                        # expansions usable in param defaults
  prefix: { from: env, name: TEST_ENTITY_PREFIX, default: "test" }
  seq:    { from: counter }    # per-run monotonic counter

risk:                          # your risk taxonomy (low → most dangerous)
  levels: [low, destructive]
  gated:  [destructive]        # what --refuse-destructive blocks

capabilities: {}               # named auth adapters (see capabilities.py)
